# ============================================================================
# .github/workflows/build-release-apk.yml
# ----------------------------------------------------------------------------
# Build a SIGNED release APK for AbbasiTahseel.
# Triggered automatically on version tags (vX.Y.Z) or manually via the UI.
# On a tag, attaches the APK + mapping.txt to the GitHub Release.
# ============================================================================

name: Build Signed Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      releaseNotes:
        description: 'Optional release notes (used only if a release is created)'
        required: false
        default: ''

# Cancel any in-progress run for the same ref so we don't build twice on rapid pushes
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write       # needed to create / upload release assets

    env:
      APP_DIR: AbbasiTahseel
      JAVA_VERSION: '17'
      NODE_VERSION: '20'
      ANDROID_TARGET_SDK: '34'
      ANDROID_BUILD_TOOLS: '34.0.0'
      GRADLE_OPTS: '-Xmx4096m -XX:MaxMetaspaceSize=512m -Dorg.gradle.daemon=false'

    steps:
      # ----------------------------------------------------------------------
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      # ----------------------------------------------------------------------
      - name: Detect version from tag or package.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="$(node -p "require('./${APP_DIR}/package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION}"

      # ----------------------------------------------------------------------
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ----------------------------------------------------------------------
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      # ----------------------------------------------------------------------
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-${{ env.ANDROID_TARGET_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            platform-tools

      # ----------------------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ----------------------------------------------------------------------
      - name: Install npm dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci --no-audit --no-fund

      # ----------------------------------------------------------------------
      - name: TypeScript check
        working-directory: ${{ env.APP_DIR }}
        run: npm run typecheck

      # ----------------------------------------------------------------------
      - name: Decode keystore from secrets
        working-directory: ${{ env.APP_DIR }}/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.ABBASI_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64}" ]; then
            echo "::error::ABBASI_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > abbasi-release.keystore
          # Verify keystore was decoded successfully
          if ! [ -s abbasi-release.keystore ]; then
            echo "::error::Decoded keystore is empty"
            exit 1
          fi
          echo "Keystore restored ($(wc -c < abbasi-release.keystore) bytes)"

      # ----------------------------------------------------------------------
      - name: Bundle JS for release (Metro-less)
        working-directory: ${{ env.APP_DIR }}
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      # ----------------------------------------------------------------------
      - name: Assemble release APK
        working-directory: ${{ env.APP_DIR }}/android
        env:
          ABBASI_STORE_PASSWORD: ${{ secrets.ABBASI_STORE_PASSWORD }}
          ABBASI_KEY_PASSWORD:   ${{ secrets.ABBASI_KEY_PASSWORD }}
          ABBASI_KEY_ALIAS:      ${{ secrets.ABBASI_KEY_ALIAS }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      # ----------------------------------------------------------------------
      - name: Rename + measure APK
        id: apk
        working-directory: ${{ env.APP_DIR }}/android/app/build/outputs/apk/release
        run: |
          set -euo pipefail
          ORIGINAL="app-release.apk"
          RENAMED="AbbasiTahseel-v${{ steps.version.outputs.version }}.apk"
          mv "$ORIGINAL" "$RENAMED"
          SIZE_MB=$(du -m "$RENAMED" | cut -f1)
          echo "name=$RENAMED" >> "$GITHUB_OUTPUT"
          echo "path=${{ github.workspace }}/${{ env.APP_DIR }}/android/app/build/outputs/apk/release/$RENAMED" >> "$GITHUB_OUTPUT"
          echo "size_mb=$SIZE_MB" >> "$GITHUB_OUTPUT"
          echo "::notice title=APK Size::${SIZE_MB} MB"
          # Hard cap at 60 MB (matches release-checklist AC)
          if [ "$SIZE_MB" -gt 60 ]; then
            echo "::error::APK size ${SIZE_MB} MB exceeds 60 MB budget"
            exit 1
          fi

      # ----------------------------------------------------------------------
      - name: Upload APK artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 90

      - name: Upload R8 mapping.txt artifact
        uses: actions/upload-artifact@v4
        with:
          name: mapping-v${{ steps.version.outputs.version }}.txt
          path: ${{ env.APP_DIR }}/android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 365

      # ----------------------------------------------------------------------
      # Attach to GitHub Release ONLY when triggered by a tag push
      # ----------------------------------------------------------------------
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: AbbasiTahseel v${{ steps.version.outputs.version }}
          body: |
            ## AbbasiTahseel v${{ steps.version.outputs.version }}

            APK size: ${{ steps.apk.outputs.size_mb }} MB
            Build: GitHub Actions run #${{ github.run_number }}
            Commit: `${{ github.sha }}`

            ${{ github.event.inputs.releaseNotes }}
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ env.APP_DIR }}/android/app/build/outputs/mapping/release/mapping.txt
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------------
      - name: Clean up keystore
        if: always()
        working-directory: ${{ env.APP_DIR }}/android/app
        run: rm -f abbasi-release.keystore || true
